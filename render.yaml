services:
  - type: web
    name: bitcore-mine-bot
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python main.py
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.8
      - key: WEBAPP_HOST
        value: 0.0.0.0
      - key: USE_WEBHOOK
        value: "true"
      - key: BOT_TOKEN
        sync: false
      - key: ADMIN_IDS
        sync: false
      - key: WEBAPP_DEV_USER_ID
        sync: false
